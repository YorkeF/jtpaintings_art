name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy via scp
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

          # Hash the plain-text admin password using PHP (available on ubuntu-latest)
          ADMIN_HASH=$(php -r "echo password_hash('$ADMIN_PASSWORD', PASSWORD_DEFAULT);")

          # Ensure directories exist on the server
          # api/ and .env live outside www/ (not web-accessible)
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" $SSH_USER@$SSH_HOST \
            "mkdir -p ~/www/uploads ~/api"

          # Write .env outside the web root (overwrites on every deploy to stay in sync)
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" $SSH_USER@$SSH_HOST "cat > ~/.env" <<EOF
          DB_HOST=$DB_HOST
          DB_NAME=$DB_NAME
          DB_USER=$DB_USER
          DB_PASS=$DB_PASS
          ADMIN_PASSWORD=$ADMIN_HASH
          EOF

          # Deploy React build directly into web root (not a dist/ subfolder)
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" -r public/dist/. $SSH_USER@$SSH_HOST:~/www/
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" public/index.php  $SSH_USER@$SSH_HOST:~/www/index.php
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" public/.htaccess  $SSH_USER@$SSH_HOST:~/www/.htaccess

          # Deploy PHP API outside the web root
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" -r api/. $SSH_USER@$SSH_HOST:~/api/

          # Deploy and run schema (idempotent — CREATE TABLE IF NOT EXISTS)
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" schema.sql $SSH_USER@$SSH_HOST:~/schema.sql
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" $SSH_USER@$SSH_HOST \
            "mysql -h '$DB_HOST' -u '$DB_USER' -p'$DB_PASS' '$DB_NAME' < ~/schema.sql"

          # ~/www/uploads/ is intentionally not deployed — images live only on the server
